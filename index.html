<head>
<meta charset="UTF-8">

<title>NB Client Map</title>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #0f172a; }

  #sidebar {
    width: 300px; min-width: 300px; background: #1e293b; color: #e2e8f0;
    display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid #334155;
    transition: width 0.2s;
  }
  #sidebar.collapsed { width: 0; min-width: 0; }

  #sidebar-header {
    padding: 16px; background: #0f172a; border-bottom: 1px solid #334155;
    flex-shrink: 0;
  }
  #sidebar-header h1 { font-size: 14px; font-weight: 700; color: #f8fafc; letter-spacing: 0.05em; text-transform: uppercase; }
  #sidebar-header p  { font-size: 11px; color: #94a3b8; margin-top: 2px; }

  #filter-scroll { overflow-y: auto; flex: 1; padding: 12px; }

  .filter-section { margin-bottom: 16px; }
  .filter-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 8px; }

  .filter-row {
    display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 6px;
    cursor: pointer; transition: background 0.1s; margin-bottom: 2px;
  }
  .filter-row:hover { background: #334155; }
  .filter-row input[type=checkbox] { accent-color: #3b82f6; width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
  .type-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .filter-row span { font-size: 12px; color: #cbd5e1; flex: 1; }
  .filter-count { font-size: 10px; color: #64748b; background: #0f172a; padding: 1px 5px; border-radius: 10px; }

  .btn-group { display: flex; gap: 6px; margin-bottom: 10px; }
  .btn-sm {
    font-size: 10px; padding: 4px 10px; border-radius: 4px; border: none; cursor: pointer;
    font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .btn-primary { background: #3b82f6; color: white; }
  .btn-ghost   { background: #334155; color: #94a3b8; }
  .btn-sm:hover { opacity: 0.85; }

  select#product-filter {
    width: 100%; background: #0f172a; color: #e2e8f0; border: 1px solid #334155;
    border-radius: 6px; padding: 6px 8px; font-size: 12px; cursor: pointer;
  }

  #stats-bar {
    padding: 10px 12px; background: #0f172a; border-top: 1px solid #334155;
    font-size: 11px; color: #64748b; flex-shrink: 0;
  }
  #stats-bar strong { color: #94a3b8; }

  #map { flex: 1; }

  #toggle-sidebar {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: #1e293b; border: 1px solid #334155; color: #94a3b8;
    padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 18px;
    display: none; line-height: 1;
  }

  @media (max-width: 768px) {
    #toggle-sidebar { display: block; }
    #sidebar {
      position: absolute; z-index: 800; height: 100%;
      width: 280px; min-width: 280px;
    }
    #sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; }
    #map { width: 100%; }
  }

  /* Popup */
  .leaflet-popup-content-wrapper { background: #1e293b; border: 1px solid #334155; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .leaflet-popup-tip { background: #1e293b; }
  .popup-inner { padding: 4px 2px; min-width: 220px; max-width: 280px; }
  .popup-name { font-size: 14px; font-weight: 700; color: #f8fafc; margin-bottom: 2px; }
  .popup-address { font-size: 11px; color: #94a3b8; margin-bottom: 8px; }
  .popup-type { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px; color: white; }
  .popup-meta { display: flex; gap: 12px; margin-bottom: 8px; }
  .popup-meta-item { font-size: 11px; color: #94a3b8; }
  .popup-meta-item strong { color: #e2e8f0; display: block; font-size: 13px; }
  .popup-products { margin-top: 6px; }
  .popup-products-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin-bottom: 4px; }
  .product-tag {
    display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px;
    margin: 2px 2px 2px 0; font-weight: 600;
  }
  .tag-destination { background: #1d4ed8; color: #bfdbfe; }
  .tag-custom      { background: #166534; color: #bbf7d0; }
  .tag-thematic    { background: #7e22ce; color: #e9d5ff; }
  .tag-other       { background: #374151; color: #d1d5db; }

  /* Custom marker */
  .map-pin {
    width: 28px; height: 28px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    border: 2px solid rgba(255,255,255,0.4); display: flex; align-items: center;
    justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .map-pin-inner {
    transform: rotate(45deg); font-size: 13px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
  }
</style>
</head>

const TYPE_STYLES  = {"Hotel":{"color":"#2563EB","icon":"\ud83c\udfe8"},"General Retail":{"color":"#7C3AED","icon":"\ud83c\udfea"},"Gift Shop":{"color":"#EC4899","icon":"\ud83c\udf81"},"Pet Retail":{"color":"#F59E0B","icon":"\ud83d\udc3e"},"Restaurant / Bar / Cafe / Bakery":{"color":"#10B981","icon":"\ud83c\udf7d\ufe0f"},"Grocery Store":{"color":"#14B8A6","icon":"\ud83d\uded2"},"Boutique":{"color":"#F472B6","icon":"\ud83d\udc57"},"Winery":{"color":"#7C3AED","icon":"\ud83c\udf77"},"Brewery":{"color":"#D97706","icon":"\ud83c\udf7a"},"Distillery":{"color":"#92400E","icon":"\ud83e\udd43"},"Campground":{"color":"#15803D","icon":"\u26fa"},"Sporting Goods Store":{"color":"#0369A1","icon":"\ud83c\udfd4\ufe0f"},"Museum":{"color":"#6D28D9","icon":"\ud83c\udfdb\ufe0f"},"Airport Gift Shop":{"color":"#0EA5E9","icon":"\u2708\ufe0f"},"Pharmacy":{"color":"#DC2626","icon":"\ud83d\udc8a"},"Hardware":{"color":"#78716C","icon":"\ud83d\udd27"},"Clothing Store":{"color":"#E11D48","icon":"\ud83d\udc55"},"Flower / Garden Shop":{"color":"#16A34A","icon":"\ud83c\udf38"},"Antique Store":{"color":"#A16207","icon":"\ud83e\ude91"},"Furniture Store":{"color":"#854D0E","icon":"\ud83d\udecb\ufe0f"},"Farm":{"color":"#65A30D","icon":"\ud83c\udf3e"},"default":{"color":"#6B7280","icon":"\ud83d\udccd"}};
const ALL_TYPES    = ["Airport Gift Shop","Antique Store","Boutique","Brewery","CMA Client","Campground","Clothing Store","Distillery","Faire Client","Farm","Flower / Garden Shop","General Retail","Gift Shop","Grocery Store","Hardware","Hotel","Museum","Pet Retail","Pharmacy","Restaurant / Bar / Cafe / Bakery","Winery"];
const ALL_PRODUCTS = ["Bulk Dog Treats","Bulk Energy Squares","Butter Toffee Mixed Nuts","Cat Treat Bags","Cat Treats","Chocolate Chip Cookie Bites","Coffee","Custom Dog Treats","Destination Dog Treats","Dog Bandana","Dog Treats (Tins)","Dog Water Bowl","Energy Squares","First Aid Kit","Granola","Gummy Fruit Slices","Half-Popped Popcorn","M&Ms","Mini Oat Cookies","Nuts","Poop Bag Dispenser","Popcorn","Reese's Pieces","Refresh Kit","Springer Water Bottle","Thematic Dog Treats","Toasted Crunchy Corn","Tote Bag","Trail Mix","Travel Essentials Kit"];
// ── Normalize CRM tags out of pin data ─────────────────────────────────────
const CRM_TAGS = new Set(["CMA Client", "Quotient Client", "Shopify Client", "Faire Client"]);
ALL_PINS.forEach(pin => {
  if (CRM_TAGS.has(pin.type)) {
    pin.type = (pin.all_types || []).find(t => !CRM_TAGS.has(t)) || pin.type;
  }
  if (pin.all_types) {
    pin.all_types = pin.all_types.filter(t => !CRM_TAGS.has(t));
  }
});

// ── Map init ────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [38.5, -96], zoom: 4, zoomControl: false });
L.control.zoom({ position: 'topright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 19
}).addTo(map);

// ── State ───────────────────────────────────────────────────────────────────
let activeTypes   = new Set(ALL_TYPES);
let activeProduct = '';
let markerLayer   = L.layerGroup().addTo(map);

// ── Marker creation ─────────────────────────────────────────────────────────
function makeIcon(type) {
  const style = TYPE_STYLES[type] || TYPE_STYLES['default'];
  const html = `<div class="map-pin" style="background:${style.color}">
    <div class="map-pin-inner">${style.icon}</div></div>`;
  return L.divIcon({ html, className: '', iconSize: [28,28], iconAnchor: [14,28], popupAnchor: [0,-30] });
}

function productTag(prod) {
  const p = prod.toLowerCase();
  let cls = 'tag-other';
  if (p.includes('destination')) cls = 'tag-destination';
  else if (p.includes('custom dog')) cls = 'tag-custom';
  else if (p.includes('thematic')) cls = 'tag-thematic';
  return `<span class="product-tag ${cls}">${prod}</span>`;
}

function makePopup(pin) {
  const style  = TYPE_STYLES[pin.type] || TYPE_STYLES['default'];
  const products = (pin.products || [])
    .filter(p => !['Service Fee','Shipping Fee','R&D','Bags Only'].includes(p))
    .map(productTag).join('');
  return `<div class="popup-inner">
    <div class="popup-name">${pin.client_name || pin.name}</div>
    <span class="popup-type" style="background:${style.color}">${style.icon} ${pin.type}</span>
    ${products ? `<div class="popup-products"><div class="popup-products-label">Products</div>${products}</div>` : ''}
  </div>`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  markerLayer.clearLayers();
  let shown = 0;
  const typeCounts = {};

  ALL_PINS.forEach(pin => {
    if (!activeTypes.has(pin.type)) return;
    if (activeProduct && !(pin.products||[]).some(p => p.toLowerCase().includes(activeProduct.toLowerCase()))) return;
    if (!pin.lat || !pin.lon) return;

    typeCounts[pin.type] = (typeCounts[pin.type] || 0) + 1;
    const marker = L.marker([pin.lat, pin.lon], { icon: makeIcon(pin.type) });
    marker.bindPopup(makePopup(pin), { maxWidth: 300 });
    markerLayer.addLayer(marker);
    shown++;
  });

  document.getElementById('pin-count').textContent = `${shown} of ${ALL_PINS.length} locations`;

  // Update counts on checkboxes
  ALL_TYPES.forEach(t => {
    const el = document.getElementById(`count-${t.replace(/[^a-z0-9]/gi,'_')}`);
    if (el) el.textContent = typeCounts[t] || 0;
  });

  const totalRev = ALL_PINS.filter(p => activeTypes.has(p.type))
    .reduce((s,p) => s + (p.revenue||0), 0);
  document.getElementById('stats-text').innerHTML =
    `<strong>${shown}</strong> pins shown`;
}

// ── Filters UI ───────────────────────────────────────────────────────────────
function buildTypeFilters() {
  const container = document.getElementById('type-filters');
  ALL_TYPES.forEach(type => {
    const style = TYPE_STYLES[type] || TYPE_STYLES['default'];
    const safeId = type.replace(/[^a-z0-9]/gi,'_');
    const row = document.createElement('label');
    row.className = 'filter-row';
    row.innerHTML = `
      <input type="checkbox" id="chk-${safeId}" checked onchange="toggleType('${type}', this.checked)">
      <span class="type-dot" style="background:${style.color}"></span>
      <span>${style.icon} ${type}</span>
      <span class="filter-count" id="count-${safeId}">0</span>`;
    container.appendChild(row);
  });
}

function buildProductFilter() {
  const sel = document.getElementById('product-filter');
  ALL_PRODUCTS.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => { activeProduct = sel.value; render(); });
}

function toggleType(type, checked) {
  checked ? activeTypes.add(type) : activeTypes.delete(type);
  render();
}

function selectAllTypes() {
  activeTypes = new Set(ALL_TYPES);
  document.querySelectorAll('#type-filters input').forEach(c => c.checked = true);
  render();
}

function clearAllTypes() {
  activeTypes.clear();
  document.querySelectorAll('#type-filters input').forEach(c => c.checked = false);
  render();
}

// ── Sidebar toggle ────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const btn     = document.getElementById('toggle-sidebar');
  const collapsed = sidebar.classList.toggle('collapsed');
  btn.textContent = collapsed ? '☰' : '✕';
}

// ── Init ─────────────────────────────────────────────────────────────────────
buildTypeFilters();
buildProductFilter();
render();
</script>
</body>
</html>
